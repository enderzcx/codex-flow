id: implementation-plan
version: 1.0.0
title: Implementation Plan Review
description: Review a tracked implementation-plan diff for scope, sequencing, risk, and verification.
tags:
  - planning
  - read-only
  - example
capabilities:
  writes: false
inputs:
  target:
    type: path
    required: true
    description: Git repository with a tracked planning or implementation diff to review.
requires:
  target: git-repo
defaults:
  sandbox: read-only
  timeout_ms: 300000
phases:
  - id: collect
    kind: command
  - id: review
    kind: codex-parallel
    workers:
      - id: scope
        perspective: scope control and acceptance criteria
        prompt: |
          Review the supplied git diff for unclear scope, missing non-goals,
          acceptance criteria gaps, and places where the plan could drift.
          Keep feedback tied to concrete diff evidence.
      - id: sequencing
        perspective: implementation sequencing and dependencies
        prompt: |
          Review the supplied git diff for risky sequencing, hidden dependencies,
          missing migration steps, and unclear rollback or resume points.
          Suggest smaller reversible slices when useful.
      - id: verification
        perspective: tests, evidence, and completion criteria
        prompt: |
          Review the supplied git diff for weak verification, missing fixture or
          smoke coverage, ambiguous success signals, and unsupported claims.
          Prefer commands or manual evidence steps.
  - id: reduce
    kind: reducer
    reducer: diff-review
artifacts:
  - workflow.json
  - state.json
  - events.jsonl
  - workers/*.json
  - artifacts/reduced-result.json
  - artifacts/manifest.json
  - result.md
