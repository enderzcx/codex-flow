id: release-review
version: 0.7.0
title: Release Review
description: Review a tracked release diff for ship readiness, rollout risk, and rollback evidence.
tags:
  - release
  - read-only
  - example
capabilities:
  writes: false
inputs:
  target:
    type: path
    required: true
    description: Git repository with a tracked release-oriented diff to review.
requires:
  target: git-repo
defaults:
  sandbox: read-only
  timeout_ms: 300000
phases:
  - id: collect
    kind: command
  - id: review
    kind: codex-parallel
    workers:
      - id: readiness
        perspective: release readiness and user-visible behavior
        prompt: |
          Review the supplied git diff for release blockers, user-visible changes,
          compatibility risk, documentation gaps, and missing acceptance evidence.
      - id: rollout
        perspective: rollout, monitoring, and rollback plan
        prompt: |
          Review the supplied git diff for rollout sequencing, rollback gaps,
          config or environment risk, monitoring gaps, and unclear ownership.
      - id: regression
        perspective: regression testing and smoke coverage
        prompt: |
          Review the supplied git diff for missing regression tests, smoke coverage,
          fixture updates, and verification commands needed before shipping.
  - id: reduce
    kind: reducer
    reducer: diff-review
artifacts:
  - workflow.json
  - state.json
  - events.jsonl
  - workers/*.json
  - artifacts/reduced-result.json
  - artifacts/manifest.json
  - result.md
