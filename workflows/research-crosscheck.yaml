id: research-crosscheck
version: 1.0.0
title: Research Cross-Check
description: Review a tracked research or documentation diff for source fidelity and unsupported claims.
tags:
  - research
  - read-only
  - example
capabilities:
  writes: false
inputs:
  target:
    type: path
    required: true
    description: Git repository with a tracked research or documentation diff to cross-check.
requires:
  target: git-repo
defaults:
  sandbox: read-only
  timeout_ms: 300000
phases:
  - id: collect
    kind: command
  - id: review
    kind: codex-parallel
    workers:
      - id: source-fidelity
        perspective: source fidelity and citation grounding
        prompt: |
          Review the supplied git diff for factual claims without primary-source
          support, citation gaps, source/name mismatches, and overconfident language.
          Do not browse; mark missing evidence as a verification gap.
      - id: skeptic
        perspective: adversarial claim checking
        prompt: |
          Review the supplied git diff as a skeptical reader. Identify claims that
          could be false, outdated, overstated, or based on weak evidence in the
          supplied context.
      - id: synthesis
        perspective: synthesis quality and reader actionability
        prompt: |
          Review the supplied git diff for unclear synthesis, missing caveats,
          unsupported recommendations, and places where conclusions outrun the
          evidence available in the diff.
  - id: reduce
    kind: reducer
    reducer: diff-review
artifacts:
  - workflow.json
  - state.json
  - events.jsonl
  - workers/*.json
  - artifacts/reduced-result.json
  - artifacts/manifest.json
  - result.md
