id: diff-review
version: 1.0.0
title: Diff Review
description: Review a git diff with independent Codex worker perspectives.
tags:
  - review
  - read-only
capabilities:
  writes: false
inputs:
  target:
    type: path
    required: true
    description: Git repository with a tracked diff to review.
requires:
  target: git-repo
defaults:
  sandbox: read-only
  timeout_ms: 300000
phases:
  - id: collect
    kind: command
  - id: review
    kind: codex-parallel
    workers:
      - id: correctness
        perspective: correctness and regressions
        prompt: |
          Review the supplied git diff for behavior regressions, broken assumptions,
          edge cases, and missing error handling. Do not suggest style-only changes.
      - id: tests
        perspective: tests and verification gaps
        prompt: |
          Review the supplied git diff for missing tests, weak assertions,
          fixture gaps, and concrete verification commands.
      - id: safety
        perspective: security, permissions, data-loss, and rollback risk
        prompt: |
          Review the supplied git diff for security, permission mistakes,
          data-loss risk, unexpected writes, and rollback gaps.
  - id: reduce
    kind: reducer
    reducer: diff-review
artifacts:
  - workflow.json
  - state.json
  - events.jsonl
  - workers/*.json
  - artifacts/reduced-result.json
  - artifacts/manifest.json
  - result.md
