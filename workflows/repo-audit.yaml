id: repo-audit
version: 0.7.0
title: Repo Audit
description: Audit a tracked repo diff for maintainability, project hygiene, and release risk.
tags:
  - audit
  - read-only
  - example
capabilities:
  writes: false
inputs:
  target:
    type: path
    required: true
    description: Git repository with a tracked diff to audit.
requires:
  target: git-repo
defaults:
  sandbox: read-only
  timeout_ms: 300000
phases:
  - id: collect
    kind: command
  - id: review
    kind: codex-parallel
    workers:
      - id: structure
        perspective: repository structure and maintainability
        prompt: |
          Audit the supplied git diff for repository structure, maintainability,
          naming, ownership boundaries, dependency hygiene, and accidental complexity.
          Stay read-only and only use supplied context.
      - id: quality
        perspective: code quality, tests, and documentation coverage
        prompt: |
          Audit the supplied git diff for weak tests, missing documentation, brittle
          interfaces, confusing public behavior, and verification gaps.
          Prefer concrete findings with file or diff evidence.
      - id: release-risk
        perspective: release, rollback, and operational risk
        prompt: |
          Audit the supplied git diff for release risk, rollback gaps, migration risk,
          observability gaps, and user-visible behavior changes.
          Do not suggest style-only changes.
  - id: reduce
    kind: reducer
    reducer: diff-review
artifacts:
  - workflow.json
  - state.json
  - events.jsonl
  - workers/*.json
  - artifacts/reduced-result.json
  - artifacts/manifest.json
  - result.md
