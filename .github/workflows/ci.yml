name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build and test
        run: npm run check

      - name: Package dry-run
        run: npm pack --dry-run

      - name: CLI smoke
        run: bash scripts/smoke-cli.sh
