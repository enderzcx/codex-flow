id: safe-write-fixture
version: 1.10.0-fixture
title: Safe Write Fixture
description: Fixture workflow for bounded patch-mode writes after preview and approval.
tags:
  - write-capable
  - safe-write
  - gated
  - fixture
capabilities:
  writes: true
write_policy:
  mode: patch
  allowed_paths:
    - src/generated/**
  forbidden_paths:
    - .env
    - .git
    - .git/**
  verification_commands:
    - test -f src/generated/safe-write-result.js
inputs:
  target:
    type: path
    required: true
requires:
  target: git-repo
defaults:
  sandbox: read-only
  timeout_ms: 300000
phases:
  - id: collect
    kind: command
  - id: preview-write
    kind: write-preview
    prompt: Prepare a bounded generated-source write.
  - id: approve-write
    kind: gate
    prompt: Approve the bounded generated-source write.
    requires_approval: true
  - id: review
    kind: codex-write
    writes: true
    worker:
      id: safe-write
      perspective: safe bounded write
      prompt: Create src/generated/safe-write-result.js with a small fixture export.
  - id: reduce
    kind: reducer
    reducer: diff-review
artifacts:
  - artifacts/write-plan.md
  - artifacts/dry-run-preview.md
  - artifacts/verification-plan.md
  - artifacts/proposed.patch
  - artifacts/proposed-patch.md
  - artifacts/diff-summary.md
  - artifacts/rollback.md
  - artifacts/verification.md
  - workers/safe-write.json
  - result.md
