id: diff-review
version: 0.4.0-fixture
description: Fixture workflow that pauses at a gate before read-only review.
requires:
  target: git-repo
defaults:
  sandbox: read-only
  timeout_ms: 300000
phases:
  - id: collect
    kind: command
  - id: approve-review
    kind: gate
    prompt: Review the collected diff before continuing.
    requires_approval: true
  - id: review
    kind: codex-parallel
    workers:
      - id: correctness
        perspective: correctness
        prompt: Review correctness.
  - id: reduce
    kind: reducer
    reducer: diff-review
artifacts:
  - workflow.json
  - state.json
  - events.jsonl
  - context.json
  - workers/*.json
  - result.md
